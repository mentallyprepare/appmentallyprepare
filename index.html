const css = `
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#F9F8F4;
  --surface:#FFFFFF;
  --text:#2B2A27;
  --muted:#7A7975;
  --dim:#B8B7B2;
  --border:#E6E4DF;

}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}

/* ── WRAP ── */
.wrap{
  width:100%;max-width:480px;height:100svh;
  margin:0 auto;position:relative;overflow:hidden;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

/* Analog Grain */
.wrap::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;
}

/* ── SCREEN TRANSITIONS ── */
.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;
  z-index:1;background:var(--bg); width:100%;
}
.screen.enter  {animation:screenEnter 0.8s cubic-bezier(0.2,0.8,0.2,1) both;}
.screen.exit   {animation:screenExit  0.5s cubic-bezier(0.4,0,0.2,1) both;}
.screen.enter-back {animation:screenEnterBack 0.8s cubic-bezier(0.2,0.8,0.2,1) both;}
.screen.exit-back  {animation:screenExitBack  0.5s cubic-bezier(0.4,0,0.2,1) both;}

@keyframes screenEnter     {from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes screenExit      {from{opacity:1;transform:none;}to{opacity:0;transform:translateY(-12px);}}
@keyframes screenEnterBack {from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
@keyframes screenExitBack  {from{opacity:1;transform:none;}to{opacity:0;transform:translateY(12px);}}

/* ── STAGGER CHILDREN ── */

.s2{animation:fadeRise 0.9s cubic-bezier(0.2,0.8,0.2,1) 0.3s both;}

.s4{animation:fadeRise 0.9s cubic-bezier(0.2,0.8,0.2,1) 0.5s both;}

.shape-2{

@keyframes spinSlow{to{transform:rotate(360deg);}}

.fine-line{width:1px;height:40px;background:var(--accent);margin:0 auto;}
.fine-line-horiz{width:40px;height:1px;background:var(--accent);margin:0 auto;}

/* ── TOGGLE ── */
.toggle-row{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 0;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.toggle-track{
  width:44px;height:24px;border-radius:100px;
  background:var(--border);position:relative;transition:all 0.3s;
  flex-shrink:0;margin-top:2px;
}
.toggle-track.on{background:var(--text);}
.toggle-thumb{
  position:absolute;top:3px;left:3px;

/* ── Q NUMBER ── */
.q-number-elegant{

/* ── SCANNING TEXT ── */

@keyframes breath {

/* ── TRAIT BAR ── */
.t-wrap{margin-bottom:20px;}
.t-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.t-label{font-family:var(--sans);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}

/* ── SCROLL ── */
.scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-y::-webkit-scrollbar{display:none;}
`;

async function callClaude(systemPrompt, userMessage, onChunk) {
  const dummyResponse = {
    archetype_name: "The Quiet Storm",
    archetype_rarity: "Rare Profile",
    core_truth: "You see the world not as it is, but as it could be, finding solace in the quiet spaces between noise.",
    the_wound: "You learned early that your sensitivity was often misunderstood as weakness.",
    the_gift: "You navigate emotional depths that others actively avoid. You anchor the periphery.",
    shadow: "You sometimes retreat so deeply into observation that you forget to participate in the living. The shadow isn't what you hide from others. It's what you hide from yourself.",
    next_unlock: "Allow yourself to be seen before you're fully prepared.",
    traits: {
      "Emotional Depth": 92,
      "Social Presence": 45,
      "Resilience": 88,
      "Self-Expression": 65,
    },
    one_line: "A quiet storm, reshaping the landscape from the shadows."
  };
  
  const text = JSON.stringify(dummyResponse);
  const chunks = text.match(/.{1,10}/g) || [];
  let current = "";
  for (const chunk of chunks) {
    current += chunk;
    onChunk(current);
    await new Promise(r => setTimeout(r, 60));
  }
  return text;
}

};

/* =========================================================================
   SCANNER SCREENS (Elegant Refactor)
========================================================================= */

const QuestionScreen = ({ q, idx, total, onAnswer, onNext, selectedAnswer }) => {
  const [text, setText] = useState("");
  const [canContinue, setCanContinue] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (q.type === "choice") setCanContinue(selectedAnswer !== null);
    else setCanContinue(text.trim().length > 12);
  }, [selectedAnswer, text, q.type]);
  
  useEffect(() => {
    if (q.type === "open") setTimeout(()=>inputRef.current?.focus(),400);
  }, [q]);

  const handleChoiceClick = (i) => { onAnswer(i); };
  const handleSubmit = () => {
    if (q.type === "open") onAnswer(text.trim());
    onNext();
  };

  return (
    <div className="screen" style={{ padding: "0 0 40px" }}>
      <div style={{ position: "relative", zIndex: 1, flex: 1, display: "flex", flexDirection: "column" }}>
        
        {/* Progress */}
        <div className="progress-wrap" style={{ position: "absolute", top: 0, left: 0, right: 0, padding: 0 }}>
          <div className="worm-track">
            <div className="worm-fill" style={{ width: \`\${((idx + 1) / total) * 100}%\` }} />
          </div>
        </div>

        {/* Content */}
        <div className="scroll-y" style={{ flex: 1, padding: "52px 32px 32px", position: "relative" }}>
          <div className="q-number-elegant">0{idx + 1}</div>
          <div className="fine-line s0" style={{ marginBottom: 32, marginLeft: 0 }} />
          
          <h3 className="h3 s1" style={{ whiteSpace: "pre-line", marginBottom: 12 }}>{q.text}</h3>
          {q.sub && <div className="body s2" style={{ fontSize: 13, color: "var(--dim)" }}>{q.sub}</div>}

          {q.type === "choice" && (
            <div className="s3" style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 40 }}>
              {q.choices.map((c, i) => (
                <button
                  key={i}
                  className={\`choice \${selectedAnswer === i ? "selected" : ""}\`}
                  onClick={() => handleChoiceClick(i)}
                >
                  <div className="ch-sub" style={{ fontFamily: "var(--serif)", fontSize: 18, fontStyle: "italic", marginBottom: 4 }}>Option {String.fromCharCode(65 + i)}</div>
                  <div>{c}</div>
                </button>
              ))}
            </div>
          )}

          {q.type === "open" && (
            <div className="s3">
              <textarea
                ref={inputRef}
                className="open-input"
                rows={4}
                placeholder={q.placeholder}
                value={text}
                onChange={e => { setText(e.target.value); onAnswer(e.target.value); }}
              />
            </div>
          )}
        </div>

        {/* Action */}
        <div className="btn-wrap" style={{ marginTop: 16 }}>
          <button
            className="btn btn-p"
            disabled={!canContinue}
            onClick={handleSubmit}
            style={{ opacity: canContinue ? 1 : 0.3 }}
          >
            {idx === total - 1 ? "Complete Analysis" : "Continue"} {canContinue && <span className="arrow-r">→</span>}
          </button>
        </div>

      </div>
    </div>
  );
};

const ScanningScreen = () => {
  const [phraseIdx, setPhraseIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setPhraseIdx(p => (p + 1) % SCAN_PHRASES.length), 3000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="screen" style={{ alignItems: "center", justifyContent: "center" }}>
      <div className="art-box fade-in" style={{ height: 200, marginBottom: 40 }}>
        <div className="shape-circle" />
        <div className="shape-circle" style={{ width: 150, height: 150, animationDirection: "reverse", animationDuration: "30s" }} />
      </div>
      <div>
        <div className="eyebrow fade-in2" style={{ textAlign: "center", marginBottom: 16 }}>Synthesizing</div>
        <div className="scan-text-cycle fade-in3" key={phraseIdx}>
          {SCAN_PHRASES[phraseIdx]}
        </div>
      </div>
    </div>
  );
};

const ResultScreen = ({ result, userName }) => {
  const [traitVisible, setTraitVisible] = useState(false);
  const traitNames = Object.keys(result.traits || {});
  const traitVals = Object.values(result.traits || {});

  useEffect(() => {
    const t = setTimeout(() => setTraitVisible(true), 600);
    return () => clearTimeout(t);
  }, []);

  return (
    <div className="screen" style={{ padding: "0 0 40px" }}>
      <div className="scroll-y" style={{ flex: 1, padding: "52px 32px 32px" }}>
        
        {/* Header */}
        <div style={{ textAlign: "center", paddingBottom: 40, borderBottom: "1px solid var(--border)", marginBottom: 40 }}>
          <div className="fine-line s0" style={{ marginBottom: 24 }} />
          <div className="eyebrow s1" style={{ marginBottom: 16 }}>The Verdict</div>
          <div className="s2" style={{ fontSize: 13, color: "var(--muted)", fontFamily:"var(--serif)", fontStyle:"italic", marginBottom: 8 }}>{userName||"You"} are</div>
          <h2 className="h2 s3" style={{ fontSize: 42, marginBottom: 24 }}>{result.archetype_name}</h2>
          
          <div className="s4" style={{ padding: "24px", background: "var(--surface)", border: "1px solid var(--border)", textAlign: "left" }}>
            <p className="serif" style={{ fontSize: 18, fontStyle: "italic", lineHeight: 1.6, color: "var(--text)" }}>"{result.one_line}"</p>
          </div>
        </div>

        {/* Content */}
        <div className="s5">
          <div className="card">
            <div className="eyebrow" style={{ marginBottom: 12 }}>Core Truth</div>
            <p className="body">{result.core_truth}</p>
          </div>
          
          <div className="card">
            <div className="eyebrow" style={{ marginBottom: 12 }}>The Wound & The Gift</div>
            <p className="body" style={{ marginBottom: 16 }}><strong>The Wound:</strong> {result.the_wound}</p>
            <p className="body"><strong>The Gift:</strong> {result.the_gift}</p>
          </div>

          <div className="card">
            <div className="eyebrow" style={{ marginBottom: 24 }}>Trait Map</div>
            {traitVisible && traitNames.map((name, i) => (
              <div className="t-wrap" key={name}>
                <div className="t-row">
                  <span className="t-label">{name}</span>
                  <span style={{ fontFamily:"var(--serif)" }}>{traitVals[i]}</span>
                </div>
                <div className="t-track">
                  <div className="t-fill" style={{ width: \`\${traitVals[i]}%\`, transitionDelay: \`\${i * 0.15}s\` }} />
                </div>
              </div>
            ))}
          </div>

          <div className="card" style={{ background:"var(--primary)", borderColor:"var(--primary-hover)", color:"#fff" }}>
             <div className="eyebrow" style={{ marginBottom: 12, color:"rgba(255,255,255,0.7)" }}>Shadow Side</div>
             <p className="body" style={{ color:"#fff" }}>{result.shadow}</p>
          </div>

          <div className="card" style={{ textAlign:"center", padding:"40px 24px" }}>
             <div className="fine-line-horiz" style={{ marginBottom: 24 }} />
             <div className="eyebrow" style={{ marginBottom: 16 }}>Your Next Unlock</div>
             <p className="serif" style={{ fontSize: 22, fontStyle:"italic" }}>{result.next_unlock}</p>
          </div>
        </div>

      </div>
    </div>
  );
};

/* =========================================================================
   APP CONTROLLER
========================================================================= */
function App() {
  const [phase, setPhase] = useState("onboarding"); // onboarding | scanning | result
  
  // Onboarding state
  const [obScreen, setObScreen] = useState(0);
  const [obDir, setObDir] = useState("fwd");
  const [obAnim, setObAnim] = useState("enter");
  const [obTrans, setObTrans] = useState(false);

  // User Data
  const [name, setName] = useState("");
  const [intention, setIntention] = useState(null);

  // Scan State
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState(Array(QUESTIONS.length).fill(null));
  const [currentAnswer, setCurrentAnswer] = useState(null);
  const [result, setResult] = useState(null);

  // --- Onboarding Navigation ---
  const goOb = useCallback((to) => {
    if (obTrans) return;
    const forward = to > obScreen;
    setObTrans(true);
    setObDir(forward ? "fwd" : "back");
    setObAnim(forward ? "exit" : "exit-back");
    setTimeout(() => {
      setObScreen(to);
      setObAnim(forward ? "enter" : "enter-back");
      setObTrans(false);
    }, 480);
  }, [obScreen, obTrans]);

  const obProps = {
    onNext: () => goOb(obScreen + 1),
    onBack: () => goOb(obScreen - 1),
    name, setName, intention, setIntention, pick: intention, setPick: setIntention
  };

  const OB_SCREENS = [
    <S0_Splash {...obProps}/>,
    <S1_Promise {...obProps}/>,
    <S2_Name {...obProps}/>,
    <S3_Intention {...obProps}/>,
    <S4_ArchetypeTease {...obProps}/>,
    <S5_Permissions {...obProps}/>,
    <S6_Ready {...obProps} onFinish={() => {
      setPhase("scanning");
      setQIdx(0);
      setObAnim("enter"); // reset for scan screens
    }}/>,
  ];

  // --- Scan Navigation ---
  const handleAnswer = useCallback((val) => setCurrentAnswer(val), []);
  const handleNextQ = useCallback(async () => {
    const newAnswers = [...answers];
    newAnswers[qIdx] = currentAnswer;
    setAnswers(newAnswers);
    setCurrentAnswer(null);

    if (qIdx < QUESTIONS.length - 1) {
      setObAnim("exit");
      setTimeout(()=>{
        setQIdx(i => i + 1);
        setObAnim("enter");
      }, 480);
    } else {
      // Finished questions -> AI processing
      setPhase("processing");
      try {
        let finalText = "";
        await callClaude("", "process", (partial) => { finalText = partial; });
        const clean = finalText.replace(/```json|```/gi, "").trim();
        const parsed = JSON.parse(clean);
        setResult(parsed);
        setTimeout(() => setPhase("result"), 3000); // let animation run
      } catch (err) {
        console.error(err);
      }
    }
  }, [qIdx, answers, currentAnswer]);

  return (
    <React.Fragment>
      <style>{css}</style>
      <div className="wrap">
        
        {/* ONBOARDING FLOW */}
        {phase === "onboarding" && (
          <React.Fragment>
            {obScreen > 0 && obScreen < TOTAL_ONBOARDING && (
              <div className="progress-wrap" style={{position:"absolute",top:0,left:0,right:0,zIndex:10}}>
                <div className="worm-track">
                  <div className="worm-fill" style={{width:\`\${(obScreen/(TOTAL_ONBOARDING - 1))*100}%\`}}/>
                </div>
              </div>
            )}
            <div key={\`ob-\${obScreen}\`} className={\`screen \${obAnim}\`}>
              {OB_SCREENS[obScreen]}
            </div>
          </React.Fragment>
        )}

        {/* SCANNING FLOW (Questions) */}
        {phase === "scanning" && (
          <div key={\`q-\${qIdx}\`} className={\`screen \${obAnim}\`}>
             <QuestionScreen
                q={QUESTIONS[qIdx]}
                idx={qIdx}
                total={QUESTIONS.length}
                selectedAnswer={currentAnswer}
                onAnswer={handleAnswer}
                onNext={handleNextQ}
              />
          </div>
        )}

        {/* AI PROCESSING */}
        {phase === "processing" && <ScanningScreen />}

        {/* RESULT */}
        {phase === "result" && result && (
           <div className="screen enter">
             <ResultScreen result={result} userName={name} />
           </div>
        )}

      </div>
    </React.Fragment>
  );
}

// Render
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
