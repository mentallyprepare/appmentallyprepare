<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Checkout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08050F;color:#F8F2FF;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#0E0A18;border:1px solid rgba(248,242,255,0.07);border-radius:20px;padding:32px;width:100%;max-width:360px;text-align:center}
h1{font-size:20px;margin-bottom:8px;color:#F8F2FF}
.price{font-size:36px;color:#EBB4C2;margin:16px 0 8px;font-weight:600}
.name{color:rgba(248,242,255,0.62);font-size:13px;margin-bottom:24px}
.btn{background:#9B4F66;color:#fff;border:none;border-radius:100px;padding:16px;width:100%;font-size:15px;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:0.5}
.btn-sec{background:transparent;border:1px solid rgba(248,242,255,0.07);color:rgba(248,242,255,0.62);border-radius:100px;padding:12px;width:100%;font-size:13px;cursor:pointer;margin-top:8px}
#status{margin-top:16px;font-size:13px;color:rgba(248,242,255,0.35)}
</style>
</head>
<body>
<div class="card">
  <h1>Complete payment</h1>
  <div class="price" id="amount">—</div>
  <div class="name" id="productName">—</div>
  <button class="btn" id="payBtn" onclick="openCheckout()">Pay now</button>
  <button class="btn-sec" onclick="cancel()">Cancel</button>
  <div id="status"></div>
</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const params = new URLSearchParams(location.search);
const orderId = params.get('order_id');
const amount = params.get('amount');
const currency = params.get('currency');
const keyId = params.get('key_id');
const productName = params.get('name') || 'Product';
const paymentId = params.get('payment_id');

document.getElementById('amount').textContent = currency + ' ' + (parseInt(amount||0)/100).toFixed(2);
document.getElementById('productName').textContent = productName;

function openCheckout() {
  const options = {
    key: keyId,
    amount: amount,
    currency: currency,
    order_id: orderId,
    name: 'Mentally Prepare',
    description: productName,
    handler: function(response) {
      document.getElementById('status').textContent = 'Payment successful!';
      const msg = JSON.stringify({
        type: 'payment_success',
        razorpay_payment_id: response.razorpay_payment_id,
        razorpay_order_id: response.razorpay_order_id,
        razorpay_signature: response.razorpay_signature
      });
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(msg);
      }
    },
    modal: {
      ondismiss: function() {
        document.getElementById('status').textContent = 'Payment cancelled';
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'payment_cancelled' }));
        }
      }
    }
  };
  const rzp = new Razorpay(options);
  rzp.on('payment.failed', function(response) {
    document.getElementById('status').textContent = 'Payment failed: ' + (response.error?.description || 'Unknown error');
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'payment_failed', error: response.error?.description }));
    }
  });
  rzp.open();
}

function cancel() {
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'payment_cancelled' }));
  }
}
</script>
</body>
</html>
