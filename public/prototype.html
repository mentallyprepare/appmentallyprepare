<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mentally Prepare — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root{
  --bg:#09070F;--bgL:#120D1D;--card:#191321;--cardS:rgba(31,23,43,0.78);
  --paper:#F1EAE1;--ink:#F5EFF7;--inkM:rgba(245,239,247,0.72);
  --inkS:rgba(245,239,247,0.46);--inkPaper:#211B22;--inkPaperM:#6D6269;
  --rose:#D3A0B1;--mauve:#AE8BC2;--gold:#D0B278;--green:#789889;--warn:#C87982;
  --line:rgba(245,239,247,0.08);--lineS:rgba(245,239,247,0.04);
  --fontSerif:'Cormorant Garamond',serif;--fontSans:'Inter',sans-serif;
  --rSm:8px;--rMd:14px;--rLg:20px;--rXl:28px;
  --phoneW:375px;--phoneH:812px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#06040A;color:var(--ink);font-family:var(--fontSans);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-x:hidden}

/* ── Star field canvas ── */
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── 3D Perspective container ── */
.perspective-wrap{perspective:1200px;perspective-origin:50% 40%;z-index:1;position:relative}
.phone-tilt{transition:transform .08s ease-out;transform-style:preserve-3d;will-change:transform}

/* ── Improved transitions ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pageFold{from{opacity:0;transform:rotateX(-5deg) translateY(20px);transform-origin:top center}to{opacity:1;transform:rotateX(0) translateY(0)}}
@keyframes constPulse{0%,100%{box-shadow:0 0 8px rgba(208,178,120,0.2)}50%{box-shadow:0 0 20px rgba(208,178,120,0.4)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.6}}

/* ── Page header ── */
.page-header{text-align:center;padding:20px 16px 16px;max-width:900px;width:100%}
.page-header h1{font-family:var(--fontSerif);font-size:26px;font-weight:400;color:var(--rose);letter-spacing:-0.3px}
.page-header p{font-size:12px;color:var(--inkM);margin-top:3px}
.mode-toggle{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;margin-top:12px}
.mode-btn{padding:7px 18px;border-radius:999px;border:none;background:transparent;color:var(--inkM);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--rose);color:var(--bg);font-weight:500}

/* ── Overview Grid ── */
.overview-grid{display:none;max-width:960px;width:100%;padding:0 8px 40px}
.overview-grid.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px}
.mini-phone{background:var(--bg);border-radius:22px;overflow:hidden;aspect-ratio:375/812;box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);position:relative;cursor:pointer;transition:transform .25s,box-shadow .25s}
.mini-phone:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(211,160,177,0.12)}
.mini-phone .m-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:14px;background:#06040A;border-radius:0 0 8px 8px;z-index:10}
.mini-phone .m-bar{position:absolute;top:2px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;font-size:6px;color:var(--inkM);z-index:9}
.mini-phone .m-home{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:50px;height:2px;border-radius:2px;background:var(--inkS);z-index:10}
.mini-phone .m-content{padding:18px 8px 14px;height:100%;display:flex;flex-direction:column;font-size:7px;line-height:1.3;color:var(--ink);overflow:hidden}
.mini-phone .m-label{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:9px;color:var(--inkS);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Phone frame ── */
.phone-wrap{display:none;flex-direction:column;align-items:center;padding-bottom:40px;position:relative}
.phone-wrap::before{content:'';position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(211,160,177,0.06) 0%,rgba(174,139,194,0.03) 40%,transparent 70%);pointer-events:none;z-index:-1}
.phone-wrap.active{display:flex}
.phone{width:var(--phoneW);height:var(--phoneH);background:var(--bg);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 20px 80px rgba(0,0,0,0.7),0 4px 24px rgba(0,0,0,0.4)}
.phone::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:44px;pointer-events:none;background:linear-gradient(160deg,rgba(255,255,255,0.03) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.1) 100%);z-index:101}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#06040A;border-radius:0 0 18px 18px;z-index:100;display:flex;align-items:center;justify-content:center;gap:8px}
.phone-notch .spkr{width:36px;height:4px;border-radius:2px;background:var(--card)}
.phone-notch .cam{width:8px;height:8px;border-radius:50%;background:var(--bg);border:1px solid var(--card)}
.phone-bar{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:space-between;padding:0 28px;font-size:10px;color:var(--inkM);z-index:99;height:18px;align-items:center;font-weight:500}
.phone-bar .right{display:flex;gap:3px;font-size:8px}
.phone-home{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:3px;background:var(--inkS);z-index:100}

/* ── Screens ── */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.screen-content{flex:1;overflow-y:auto;padding:50px 20px 24px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.screen-content::-webkit-scrollbar{display:none}

/* ── Typography ── */
.editorial{font-family:var(--fontSerif);font-weight:400;color:var(--ink)}
.editorial em{font-style:italic;color:var(--inkM)}
h1{font-family:var(--fontSerif);font-size:30px;font-weight:400;color:var(--ink);line-height:1.2}
h2{font-family:var(--fontSerif);font-size:24px;font-weight:400;color:var(--ink);line-height:1.25}
h3{font-size:16px;font-weight:500;color:var(--ink)}
p{font-size:14px;color:var(--inkM);line-height:1.6}
.sub{font-size:13px;color:var(--inkM)}
.label{font-size:10px;color:var(--inkS);letter-spacing:1.5px;text-transform:uppercase}
.label-accent{font-size:10px;color:var(--rose);letter-spacing:1.5px;text-transform:uppercase}

/* ── Buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:var(--rMd);font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;width:100%;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.btn:active{transform:scale(0.97)}
.btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);transform:scale(0);animation:ripple .5s ease-out;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.btn-primary{background:var(--rose);color:var(--bg)}
.btn-secondary{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn-ghost{background:transparent;color:var(--inkM)}
.btn-destructive{background:transparent;color:var(--warn)}
.btn-sm{padding:10px 16px;font-size:12px;width:auto}

/* ── Form ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:10px;color:var(--inkS);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);color:var(--ink);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--rose)}
.form-input::placeholder{color:var(--inkS)}
textarea.form-input{resize:none;line-height:1.6}

/* ── Editor Surface (Warm Paper) ── */
.editor{padding:20px;border-radius:var(--rLg);background:var(--paper);position:relative}
.editor textarea{width:100%;min-height:200px;background:transparent;border:none;color:var(--inkPaper);font-size:16px;font-family:var(--fontSerif);line-height:1.7;outline:none;resize:none}
.editor textarea::placeholder{color:var(--inkPaperM)}

/* ── Choice Row ── */
.choice-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.choice-row:active{transform:scale(0.98)}
.choice-row.active{border-color:var(--rose);background:rgba(211,160,177,0.06)}
.choice-row .c-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;color:var(--inkM)}
.choice-row .c-text{flex:1}
.choice-row .c-text .c-title{font-size:14px;color:var(--ink)}
.choice-row .c-text .c-sub{font-size:12px;color:var(--inkS);margin-top:2px}

/* ─── Cards ─── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rMd);padding:16px}
.card-soft{box-shadow:0 0 40px rgba(211,160,177,0.06)}
.card-paper{background:var(--paper);color:var(--inkPaper);border:none}

/* ─── Constellation Progress ─── */
.constellation{width:100%;height:60px;position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 10px}
.const-point{width:10px;height:10px;border-radius:50%;background:var(--card);border:1px solid var(--line);position:relative;z-index:2;transition:all .4s cubic-bezier(0.34,1.56,0.64,1)}
.const-point.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(208,178,120,0.3);animation:constPulse 3s ease-in-out infinite}
.const-point.active{border-color:var(--rose);background:transparent;box-shadow:0 0 0 2px var(--rose);animation:constPulse 2s ease-in-out infinite}
.const-point.future{opacity:0.2}
.const-line{position:absolute;top:50%;left:10px;right:10px;height:1px;background:var(--lineS);z-index:1;transform:translateY(-50%)}
.const-line .fill{height:100%;background:var(--gold);transition:width .8s cubic-bezier(0.4,0,0.2,1);border-radius:1px;box-shadow:0 0 6px rgba(208,178,120,0.2)}

/* ─── Tab Bar ─── */
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:64px;background:rgba(9,7,15,0.97);border-top:1px solid var(--lineS);display:flex;align-items:center;justify-content:space-around;padding-bottom:14px;z-index:50;backdrop-filter:blur(16px)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;border:none;background:none;font-family:inherit;transition:opacity .15s}
.tab-item:active{opacity:0.6}
.tab-item .tab-icon{font-size:18px;color:var(--inkS);transition:color .2s}
.tab-item.active .tab-icon{color:var(--rose)}
.tab-item .tab-label{font-size:9px;color:var(--inkS);transition:color .2s;letter-spacing:.3px}
.tab-item.active .tab-label{color:var(--rose);font-weight:500}

/* ─── Back ─── */
.back-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{width:34px;height:34px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--inkM);transition:background .12s;flex-shrink:0;user-select:none}
.back-btn:active{background:var(--bgL)}

/* ─── Steps ─── */
.steps{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:20px}
.step-dot{width:24px;height:24px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--inkS);transition:all .2s}
.step-dot.active{border-color:var(--rose);color:var(--rose)}
.step-dot.done{background:var(--rose);border-color:var(--rose);color:var(--bg)}

/* ─── Progress Bar ─── */
.progress-track{height:2px;background:var(--lineS);border-radius:1px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--rose);border-radius:1px;transition:width .5s ease}

/* ─── Mood Selector ─── */
.mood-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.mood-row::-webkit-scrollbar{display:none}
.mood-opt{flex-shrink:0;width:44px;height:44px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s}
.mood-opt:active{transform:scale(0.92)}
.mood-opt.active{border-color:var(--gold);background:rgba(208,178,120,0.1)}

/* ─── Note Card ─── */
.note-card{padding:20px;border-radius:var(--rLg);background:var(--paper);position:relative;cursor:pointer;transition:transform .15s}
.note-card:active{transform:scale(0.98)}
.note-card .nc-label{font-size:9px;color:var(--inkPaperM);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.note-card .nc-text{font-family:var(--fontSerif);font-size:16px;color:var(--inkPaper);line-height:1.6;font-style:italic}
.note-card .nc-seal{position:absolute;top:16px;right:16px;font-size:14px;color:var(--gold)}
.note-card .nc-time{font-size:10px;color:var(--inkPaperM);margin-top:8px}

/* ─── Notif Row ─── */
.notif-row{display:flex;gap:12px;padding:14px;border-radius:var(--rSm);cursor:pointer;transition:background .15s}
.notif-row:active{background:var(--bgL)}
.notif-row.unread{border-left:2px solid var(--rose);padding-left:12px}
.notif-row .n-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center;margin-top:1px}
.notif-row .n-body{flex:1}
.notif-row .n-title{font-size:14px;color:var(--ink);font-weight:500}
.notif-row .n-text{font-size:12px;color:var(--inkM);line-height:1.4;margin-top:2px}
.notif-row .n-time{font-size:10px;color:var(--inkS);margin-top:4px}

/* ─── Setting Row ─── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--lineS);cursor:pointer;transition:background .1s;margin:0 -6px;padding:14px 6px;border-radius:6px}
.setting-row:last-child{border-bottom:none}
.setting-row:active{background:var(--card)}
.setting-row .sl{display:flex;align-items:center;gap:12px}
.setting-row .s-icon{font-size:16px;width:22px;text-align:center;color:var(--inkM)}

/* ─── Toggle ─── */
.toggle{width:40px;height:22px;border-radius:11px;background:var(--line);cursor:pointer;position:relative;transition:background .25s cubic-bezier(0.4,0,0.2,1);flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle .thumb{width:18px;height:18px;border-radius:50%;background:var(--ink);position:absolute;top:2px;left:2px;transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle.on .thumb{transform:translateX(18px)}

/* ─── Arena Item ─── */
.arena-item{padding:14px;border-radius:var(--rSm);background:var(--card);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.arena-item:active{transform:scale(0.98)}
.arena-item .a-icon{font-size:16px;margin-bottom:4px}
.arena-item .a-name{font-size:14px;color:var(--ink);font-weight:500}
.arena-item .a-sub{font-size:12px;color:var(--inkS);margin-top:2px}
.arena-item .a-count{font-size:10px;color:var(--rose);margin-top:4px}

/* ─── Silent Room Entry ─── */
.sentry{padding:14px 0;border-bottom:1px solid var(--lineS)}
.sentry:last-child{border-bottom:none}
.sentry .s-line{font-family:var(--fontSerif);font-size:15px;color:var(--ink);font-style:italic;line-height:1.5}
.sentry .s-meta{display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--inkS)}

/* ─── Info Panel ─── */
.info-panel{padding:20px;border-radius:var(--rMd);background:var(--card);border:1px solid var(--line);font-size:13px;color:var(--inkM);line-height:1.7}
.info-panel.danger{border-color:rgba(200,121,130,0.2)}

/* ─── Toast ─── */
.toast{position:absolute;bottom:80px;left:20px;right:20px;padding:12px 16px;border-radius:var(--rSm);font-size:13px;z-index:200;display:none;align-items:center;gap:8px;font-weight:500;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.toast.success{background:rgba(120,152,137,0.2);border:1px solid rgba(120,152,137,0.3);color:var(--green)}
.toast.error{background:rgba(200,121,130,0.2);border:1px solid rgba(200,121,130,0.3);color:var(--warn)}
@keyframes toastUp{from{opacity:0;transform:translateY(16px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ─── Spinner ─── */
.spinner{width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--rose);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Backdrop grain ─── */
.grain{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.18;mix-blend-mode:soft-light;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");background-size:256px 256px}

/* ─── Utilities ─── */
.flex-1{flex:1}
.flex{display:flex}
.flex-col{flex-direction:column}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px}
.gap-sm{display:flex;flex-direction:column;gap:8px}
.gap-md{display:flex;flex-direction:column;gap:14px}
.gap-lg{display:flex;flex-direction:column;gap:20px}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:24px}.mt-xl{margin-top:32px}
.mb-sm{margin-bottom:8px}.mb-md{margin-bottom:16px}
.text-center{text-align:center}
.row{display:flex;gap:8px}.row-wrap{display:flex;flex-wrap:wrap;gap:8px}
.pr-4{padding-right:4px}.pl-4{padding-left:4px}

/* ─── Responsive ─── */
@media(max-width:420px){
  body{padding:0}
  .page-header{padding:12px 12px 8px}.page-header h1{font-size:20px}
  .phone{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  .phone-notch,.phone-bar,.phone-home,.mini-phone .m-notch,.mini-phone .m-bar,.mini-phone .m-home{display:none}
  .screen-content{padding-top:18px}.tab-bar{height:60px;padding-bottom:8px}.toast{bottom:72px}
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="page-header">
  <h1>Mentally Prepare</h1>
  <p>21-night anonymous emotional writing ritual</p>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('interactive')">📱 Interactive</button>
    <button class="mode-btn" onclick="setMode('overview')">🖼️ Gallery</button>
  </div>
</div>

<!-- ═══ GALLERY OVERVIEW ═══ -->
<div class="overview-grid" id="overviewGrid"></div>

<!-- ═══ INTERACTIVE PHONE ═══ -->
<div class="phone-wrap active" id="phoneWrap">
<div class="perspective-wrap"><div class="phone-tilt">
<div class="phone">
  <div class="phone-notch"><div class="spkr"></div><div class="cam"></div></div>
  <div class="phone-bar"><span>9:41</span><span class="right">●●●●</span></div>
  <div class="grain"></div>

  <!-- Screen data populated by JS -->
  <div id="screenContainer"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>
</div></div>

<script>
// ═══════════════════════════════════════════════
// SCREEN DEFINITIONS
// ═══════════════════════════════════════════════

const SCREENS = {};

// ─── Helper ───
function h(s){return `<div class="screen-content">${s}</div>`}
function back(id){return `<div class="back-wrap"><div class="back-btn" onclick="goTo('${id}')">←</div></div>`}
function btn(text,action,cls='btn-primary'){return `<button class="btn ${cls}" onclick="${action}">${text}</button>`}
function gap(content){return `<div class="gap-sm">${content}</div>`}
function label(text){return `<div class="label mb-sm">${text}</div>`}
function spacer(){return `<div class="flex-1"></div>`}
function constellation(done,active,total=21){
  let pts='',pct=done/total*100;
  for(let i=1;i<=total;i++){
    let cls='const-point';
    if(i<=done)cls+=' done';else if(i===active)cls+=' active';else cls+=' future';
    pts+=`<div class="${cls}"></div>`;
  }
  return `<div class="constellation">${pts}<div class="const-line"><div class="fill" style="width:${pct}%"></div></div></div>`;
}

// ═══════════════════════════════════════════════
// APPLICATION
// ═══════════════════════════════════════════════

function renderScreen(id) {
  const container = document.getElementById('screenContainer');
  if (!SCREENS[id]) return;
  container.innerHTML = `<div class="screen active" id="activeScreen">${SCREENS[id]}</div>`;
  const s = document.getElementById('activeScreen');
  s.style.animation = 'none';
  void s.offsetHeight;
  const foldIn = ['write','note-sealed','read-note','seal-confirm'].includes(id);
  s.style.animation = foldIn ? 'pageFold .4s cubic-bezier(0.4,0,0.2,1)' : 'fadeUp .35s ease';
  const c = s.querySelector('.screen-content');
  if (c) c.scrollTop = 0;
}

let currentScreen = 'splash';

function goTo(id) {
  if (!SCREENS[id]) { showToast('Screen coming soon','success'); return; }
  currentScreen = id;
  renderScreen(id);
  if (['tonight','arena','notifs','me'].includes(id)) renderTabs(id);
}

function renderTabs(current) {
  const tabs = [
    {id:'tonight',icon:'☽',label:'Tonight'},
    {id:'arena',icon:'◈',label:'Arena'},
    {id:'notifs',icon:'♫',label:'Alerts'},
    {id:'me',icon:'⊙',label:'Me'},
  ];
  document.querySelectorAll('.tab-bar').forEach(bar => {
    bar.innerHTML = tabs.map(t =>
      `<button class="tab-item ${current===t.id?'active':''}" onclick="goTo('${t.id}')">
        <span class="tab-icon">${t.icon}</span>
        <span class="tab-label">${t.label}</span>
      </button>`
    ).join('');
  });
}

function selectChoice(el, nextBtnId) {
  el.parentElement.querySelectorAll('.choice-row').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const btn = document.getElementById(nextBtnId);
  if (btn) btn.disabled = false;
}

function markRead() {
  document.querySelectorAll('.notif-row.unread').forEach(n => n.classList.remove('unread'));
  showToast('All marked as read','success');
}

// ─── Toast ───
let tt;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'flex';
  clearTimeout(tt); tt = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ─── Mode ───
function setMode(m) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btn[onclick*="${m}"]`).classList.add('active');
  document.getElementById('overviewGrid').classList.toggle('active', m === 'overview');
  document.getElementById('phoneWrap').classList.toggle('active', m === 'interactive');
}

// ─── Matching auto-transition ───
let matchInterval, orbitAnim;
SCREENS.matching = SCREENS.matching.replace('</div>','') + '</div>';
const origMatchingRender = renderScreen;
renderScreen = function(id) {
  origMatchingRender(id);
  if (id === 'matching') {
    clearInterval(matchInterval); cancelAnimationFrame(orbitAnim);
    const msgs = ['Keeping both of you anonymous.','Preparing your first night.','Finding someone who writes like you.','Almost there.'];
    let i = 0, orbitT = 0;
    matchInterval = setInterval(() => {
      const el = document.getElementById('matchStatus');
      if (el) el.textContent = msgs[i++ % msgs.length];
    }, 1800);

    function orbitStep() {
      orbitT += 0.025;
      const d1 = document.getElementById('orbitDot1');
      const d2 = document.getElementById('orbitDot2');
      const trail = document.getElementById('orbitTrail');
      if (d1 && d2 && trail) {
        const r = 60;
        const cx = 60, cy = 40, mx = 60, my = 40;
        const angle = orbitT * 1.2;
        const x1 = cx + Math.cos(angle) * r;
        const y1 = cy + Math.sin(angle) * r * 0.3;
        d1.style.left = (x1 - 4) + 'px';
        d1.style.top = (y1 - 4) + 'px';
        d2.style.right = (120 - (cx - Math.cos(angle + Math.PI) * r)) + 'px';
        d2.style.top = (cy - Math.sin(angle + Math.PI) * r * 0.3) + 'px';
        trail.style.left = (cx - 2 + Math.cos(angle + Math.PI / 6) * r * 0.4) + 'px';
        trail.style.top = (cy - 2 + Math.sin(angle + Math.PI / 6) * r * 0.3 * 0.4) + 'px';
        trail.style.opacity = 1;
      }
      orbitAnim = requestAnimationFrame(orbitStep);
    }
    orbitAnim = requestAnimationFrame(orbitStep);
    setTimeout(() => { clearInterval(matchInterval); cancelAnimationFrame(orbitAnim); goTo('match-found'); }, 6000);
  }
};

    ['safety','Safety'],['archetype-result','Archetype'],['matching','Matching'],['match-found','Match found'],
    ['tonight','Tonight'],['write','Writing'],['note-sealed','Note sealed'],['read-note','Reading note'],

    ['arena','Arena'],['silent-room','Silent Room'],['notifs','Notifications'],['me','Profile'],
  ];
  g.innerHTML = items.map(([id,label]) => {
    const html = SCREENS[id] || '';
    const clean = html.replace(/onclick="[^"]*"/g,'').replace(/id="[^"]*"/g,'');
    return `<div class="mini-phone" onclick="setMode('interactive');goTo('${id}')">
      <div class="m-notch"></div><div class="m-bar"><span>9:41</span><span>●●●●</span></div><div class="m-home"></div>

// ═══════════════════════════════════════════════
// STAR FIELD
// ═══════════════════════════════════════════════
(function initStars() {
  const c = document.getElementById('starCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  let w, h, stars = [], mouseX = 0, mouseY = 0;

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const count = Math.min(160, Math.floor((w * h) / 8000));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * w, y: Math.random() * h,
      r: 0.3 + Math.random() * 1.2,
      a: 0.15 + Math.random() * 0.6,
      speed: 0.002 + Math.random() * 0.008,
      phase: Math.random() * Math.PI * 2,
    });
  }

  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / w - 0.5) * 2;
    mouseY = (e.clientY / h - 0.5) * 2;
  });

  function draw() {
    ctx.clearRect(0, 0, w, h);
    const t = Date.now() / 1000;
    for (const s of stars) {
      const breath = 0.5 + 0.5 * Math.sin(t * s.speed * 3 + s.phase);
      const px = s.x + mouseX * 2 * (s.y / h);
      const py = s.y + mouseY * 2 * (s.x / w);
      const alpha = s.a * (0.3 + 0.7 * breath);
      ctx.beginPath();
      ctx.arc(px, py, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(208,178,120,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══════════════════════════════════════════════
// 3D PHONE TILT
// ═══════════════════════════════════════════════
(function initTilt() {
  const tilt = document.querySelector('.phone-tilt');
  if (!tilt) return;
  let targetX = 0, targetY = 0, curX = 0, curY = 0;
  let ticking = false;

  document.addEventListener('mousemove', e => {
    const rect = tilt.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    targetX = ((e.clientY - cy) / rect.height) * -6;
    targetY = ((e.clientX - cx) / rect.width) * 6;
    if (!ticking) {
      requestAnimationFrame(() => {
        curX += (targetX - curX) * 0.12;
        curY += (targetY - curY) * 0.12;
        tilt.style.transform = `rotateX(${curX}deg) rotateY(${curY}deg)`;
        ticking = false;
      });
      ticking = true;
    }
  });

  document.addEventListener('mouseleave', () => {
    targetX = 0; targetY = 0;
    function reset() {
      curX += (0 - curX) * 0.08;
      curY += (0 - curY) * 0.08;
      tilt.style.transform = `rotateX(${curX}deg) rotateY(${curY}deg)`;
      if (Math.abs(curX) > 0.01 || Math.abs(curY) > 0.01) requestAnimationFrame(reset);
    }
    reset();
  });
})();

// ═══════════════════════════════════════════════
// BUTTON RIPPLE (event delegation)
// ═══════════════════════════════════════════════
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'btn-ripple';
  r.style.width = r.style.height = '100px';
  r.style.left = (e.clientX - rect.left - 50) + 'px';
  r.style.top = (e.clientY - rect.top - 50) + 'px';
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});

buildGallery();
