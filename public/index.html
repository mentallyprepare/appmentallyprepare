<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mentally Prepare — Waitlist</title>
<meta name="description" content="Write anonymously for 21 days. First 500 users get a free trial run in April."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- Three.js for 3D elements -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
/* ══════════════════════════════════════════
   RESET & VARIABLES
   ══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --rose:#D4859A;--rose-l:#EBB4C2;--rose-d:#9B4F66;
  --gold:#C9A96E;--gold-l:#E8D0A0;
  --purple:#7B5EA7;--purple-l:#B09FCC;
  --ink:#F8F2FF;--ink-m:rgba(248,242,255,.62);--ink-s:rgba(248,242,255,.35);
  --line:rgba(248,242,255,.07);--card:#0E0A18;--bg:#08050F;
}
html, body {
  background:var(--bg);color:var(--ink);
  font-family:'DM Sans',sans-serif;font-weight:300;
  overflow:hidden; /* No scroll for waitlist splash */
  height: 100vh;
  width: 100vw;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--rose-d);color:var(--ink)}

/* ══════════════════════════════════════════
   3D CANVAS WRAPPER
   ══════════════════════════════════════════ */
#canvas-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ══════════════════════════════════════════
   UI LAYER
   ══════════════════════════════════════════ */
.ui-layer {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px;
  background: radial-gradient(circle at center, transparent 30%, rgba(8,5,15,0.85) 100%);
}

.brand {
  position: absolute;
  top: 40px;
  left: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.brand-orb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--purple));
  animation: breathe 4s ease-in-out infinite;
}

.hero-content {
  text-align: center;
  max-width: 600px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(14, 10, 24, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  padding: 60px 48px;
  border-radius: 32px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: fadeUp 1s ease 0.2s both;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: 50px;
  border: 1px solid rgba(201, 169, 110, 0.3); /* Gold badge for free trial */
  background: rgba(201, 169, 110, 0.08);
  margin-bottom: 32px;
  font-size: 12px;
  color: var(--gold-l);
  letter-spacing: 1px;
  text-transform: uppercase;
  animation: pulseGold 3s infinite;
}
.hero-badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
}

.hero-h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 24px;
}
.hero-h1 em {
  font-style: italic;
  color: var(--rose-l);
  font-weight: 400;
}

.hero-sub {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: clamp(16px, 2vw, 18px);
  color: var(--ink-m);
  line-height: 1.7;
  margin-bottom: 48px;
}

/* ══════════════════════════════════════════
   WAITLIST FORM
   ══════════════════════════════════════════ */
.waitlist-form {
  position: relative;
  display: flex;
  gap: 8px;
  width: 100%;
}
.waitlist-input {
  flex: 1;
  background: rgba(248, 242, 255, 0.03);
  border: 1px solid rgba(248, 242, 255, 0.1);
  padding: 18px 24px;
  border-radius: 60px;
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}
.waitlist-input::placeholder { color: var(--ink-s); }
.waitlist-input:focus {
  border-color: rgba(212, 133, 154, 0.5);
  background: rgba(248, 242, 255, 0.06);
  box-shadow: 0 0 20px rgba(212, 133, 154, 0.15);
}

.btn-primary {
  background: linear-gradient(135deg, var(--rose-d), var(--purple));
  padding: 0 40px;
  border-radius: 60px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.4s;
  border: none;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(212,133,154,0.25);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(212,133,154,0.4);
}

.response-msg {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 13px;
  margin-top: 16px;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.response-msg.error {
  color: var(--rose);
}
.response-msg.visible {
  opacity: 1;
}

/* ══════════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.15); opacity: 1; }
}
@keyframes pulseGold {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201, 169, 110, 0.2); }
  50% { box-shadow: 0 0 0 10px rgba(201, 169, 110, 0); }
}

@media(max-width: 600px) {
  .hero-content { padding: 40px 24px; }
  .waitlist-form { flex-direction: column; }
  .btn-primary { padding: 18px 40px; }
  .brand { top: 24px; left: 24px; }
}
</style>
</head>
<body>

<!-- 3D Background Container -->
<div id="canvas-container"></div>

<!-- UI Overlay -->
<div class="ui-layer">
  
  <div class="brand">
    <div class="brand-orb"></div>
    Mentally Prepare
  </div>

  <div class="hero-content">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      April Trial Run: First 500 users free
    </div>
    
    <h1 class="hero-h1">You were never meant to carry this <em>alone.</em></h1>
    <p class="hero-sub">An anonymous 21-day journal where you write honestly, and a student from another college writes back. Join the waitlist for early access.</p>
    
    <form class="waitlist-form" id="waitlistForm">
      <input type="email" class="waitlist-input" id="waitlistEmail" placeholder="Your college email address..." required autocomplete="email">
      <button type="submit" class="btn-primary" id="waitlistBtn">Join Waitlist</button>
      <div class="response-msg" id="responseMsg"></div>
    </form>
  </div>

</div>

<script>
// --- WAITLIST LOGIC ---
const form = document.getElementById('waitlistForm');
const emailInput = document.getElementById('waitlistEmail');
const btn = document.getElementById('waitlistBtn');
const responseMsg = document.getElementById('responseMsg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = emailInput.value.trim();
  if(!email) return;

  btn.disabled = true;
  btn.textContent = 'Joining...';
  responseMsg.classList.remove('visible', 'error');

  try {
    const res = await fetch('/api/waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    if (res.ok) {
      if(data.error) throw new Error(data.error);
      responseMsg.textContent = `${data.message} (${data.count || 0}/500 spots filled)`;
      emailInput.value = '';
    } else {
      throw new Error(data.error || 'Failed to join waitlist.');
    }
  } catch (err) {
    responseMsg.textContent = err.message;
    responseMsg.classList.add('error');
  } finally {
    responseMsg.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Join Waitlist';
  }
});

// --- THREE.JS 3D BACKGROUND ---
const container = document.getElementById('canvas-container');

// Scene, Camera, Renderer
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x08050F, 0.001);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 30;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Create Particles (Aesthetic Stars/Dust)
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 2000;
const posArray = new Float32Array(particlesCount * 3);
const colorsArray = new Float32Array(particlesCount * 3);

// Colors
const colorRose = new THREE.Color(0xD4859A);
const colorPurple = new THREE.Color(0x7B5EA7);
const colorGold = new THREE.Color(0xC9A96E);

for(let i = 0; i < particlesCount * 3; i+=3) {
  // Spread across wider area
  posArray[i] = (Math.random() - 0.5) * 100;    // x
  posArray[i+1] = (Math.random() - 0.5) * 100;  // y
  posArray[i+2] = (Math.random() - 0.5) * 50 - 10; // z

  // Assign random color from brand palette
  const randColor = Math.random();
  let c;
  if(randColor < 0.33) c = colorRose;
  else if(randColor < 0.66) c = colorPurple;
  else c = colorGold;

  colorsArray[i] = c.r;
  colorsArray[i+1] = c.g;
  colorsArray[i+2] = c.b;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

// Create custom shader material for soft glowing particles
const particlesMaterial = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
});
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// Create Floating Glass Morphs (3D Objects reflecting the brand)
const morphGrp = new THREE.Group();
scene.add(morphGrp);

const shapes = [
  new THREE.IcosahedronGeometry(3, 1),
  new THREE.TorusGeometry(3, 0.8, 16, 100),
  new THREE.OctahedronGeometry(3, 2)
];

const glassMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.1,
  roughness: 0.1,
  transmission: 0.9, // glass like
  thickness: 0.5,
  envMapIntensity: 1,
  clearcoat: 1,
  clearcoatRoughness: 0.1,
});

const meshes = [];
for(let i=0; i<3; i++) {
  const mesh = new THREE.Mesh(shapes[i], glassMaterial);
  mesh.position.set(
    (Math.random() - 0.5) * 40,
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 10 - 5
  );
  morphGrp.add(mesh);
  meshes.push(mesh);
}

// Lighting for glass
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xD4859A, 2, 50); // Rose
pointLight1.position.set(10, 10, 10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x7B5EA7, 2, 50); // Purple
pointLight2.position.set(-10, -10, 10);
scene.add(pointLight2);

// Mouse interaction
let mouseX = 0;
let mouseY = 0;
document.addEventListener('mousemove', (event) => {
  mouseX = (event.clientX / window.innerWidth) - 0.5;
  mouseY = (event.clientY / window.innerHeight) - 0.5;
});

// Animation Loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsedTime = clock.getElapsedTime();

  // Slow particle rotation
  particlesMesh.rotation.y = elapsedTime * 0.05;
  particlesMesh.rotation.x = elapsedTime * 0.02;

  // Float morphed items
  meshes.forEach((mesh, index) => {
    mesh.rotation.x += 0.01 * (index + 1);
    mesh.rotation.y += 0.01 * (index + 1);
    mesh.position.y += Math.sin(elapsedTime * 0.5 + index) * 0.01;
  });

  // Parallax camera effect tracking mouse softly
  camera.position.x += (mouseX * 10 - camera.position.x) * 0.05;
  camera.position.y += (-mouseY * 10 - camera.position.y) * 0.05;
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}
animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
