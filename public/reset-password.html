<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reset Password — Mentally Prepare</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#D4859A;--gold:#C9A96E;--purple:#7B5EA7;--ink:#F8F2FF;--ink-m:rgba(248,242,255,.62);--bg:#08050F;--card:#0E0A18;--line:rgba(248,242,255,.07)}
html,body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;height:100%}
body{display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:40px;width:90%;max-width:420px}
h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin-bottom:8px;color:var(--gold)}
p{font-size:14px;color:var(--ink-m);margin-bottom:24px}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink-m)}
input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.04);color:var(--ink);font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s}
input:focus{border-color:var(--gold)}
button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--gold);color:#0E0A18;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
.msg{font-size:13px;margin-top:16px;text-align:center}
.msg.error{color:var(--rose)}
.msg.success{color:var(--gold)}
</style>
</head>
<body>
<div class="card">
  <h1>Reset password</h1>
  <p>Enter your new password below.</p>
  <form id="resetForm">
    <label for="password">New password</label>
    <input id="password" type="password" placeholder="At least 8 characters" minlength="8" required autofocus/>
    <label for="confirm">Confirm password</label>
    <input id="confirm" type="password" placeholder="Re-enter" minlength="8" required/>
    <button type="submit" id="submitBtn">Reset password</button>
  </form>
  <div class="msg" id="msg"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if (!code) {
  document.getElementById('msg').className = 'msg error';
  document.getElementById('msg').textContent = 'Invalid or missing reset link.';
  document.getElementById('submitBtn').disabled = true;
}
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');
  if (pw !== confirm) { msgEl.className = 'msg error'; msgEl.textContent = 'Passwords do not match.'; return; }
  if (pw.length < 8) { msgEl.className = 'msg error'; msgEl.textContent = 'Password must be at least 8 characters.'; return; }
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const res = await fetch('/api/reset-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ code, newPassword: pw }) });
    const data = await res.json();
    if (data.ok) {
      msgEl.className = 'msg success'; msgEl.textContent = 'Password reset successfully! Redirecting to login...';
      setTimeout(() => window.location.href = '/?reset=1', 2000);
    } else {
      msgEl.className = 'msg error'; msgEl.textContent = data.error || 'Reset failed.';
      btn.disabled = false; btn.textContent = 'Try again';
    }
  } catch {
    msgEl.className = 'msg error'; msgEl.textContent = 'Network error. Please try again.';
    btn.disabled = false; btn.textContent = 'Try again';
  }
});
</script>
</body>
</html>
