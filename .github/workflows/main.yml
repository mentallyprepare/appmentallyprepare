name: Mentally Prepare CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Syntax Check
      run: node -c server.js
      
    - name: Boot Server and Health Check
      run: |
        npm start &
        # Wait a few seconds for the server to start and the SQLite DB to initialize
        sleep 5
        # Verify the health endpoint returns successfully
        curl -f http://localhost:3005/api/health
